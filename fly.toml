# fly.toml app configuration file generated for latchkey on 2026-07-11T16:23:19+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'latchkey'
primary_region = 'syd'
kill_signal = 'SIGTERM'

[build]
[deploy]
  release_command = '/app/bin/migrate'

[env]
  PHX_HOST = 'latchkey.fly.dev'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine warm so the ambient simulation sweep (Oban) runs continuously
  # and the live firehose stays fed — scale-to-zero would idle the sweep between visits.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
